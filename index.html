<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Draw a Perfect Circle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  h1 {
    font-size: 1.4rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 6px;
    font-weight: 400;
  }

  #subtitle {
    font-size: 0.72rem;
    color: #444;
    letter-spacing: 0.15em;
    margin-bottom: 16px;
  }

  /* Toggle row */
  #toggles {
    display: flex;
    gap: 14px;
    margin-bottom: 16px;
  }

  .toggle-btn {
    background: none;
    border: 1px solid #2a2a2a;
    color: #444;
    padding: 5px 14px;
    font-family: 'Courier New', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .toggle-btn.on {
    border-color: #555;
    color: #bbb;
    background: #161616;
  }

  .toggle-btn:hover {
    border-color: #666;
    color: #ccc;
  }

  /* Canvas */
  #canvas-wrapper {
    position: relative;
    width: 420px;
    height: 420px;
  }

  canvas {
    border: 1px solid #222;
    border-radius: 4px;
    cursor: crosshair;
    display: block;
    touch-action: none;
  }

  /* Score */
  #score-display {
    margin-top: 18px;
    text-align: center;
    min-height: 90px;
  }

  #score-number {
    font-size: 3.5rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    transition: color 0.3s;
  }

  #score-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: #555;
    text-transform: uppercase;
    margin-top: 2px;
  }

  #score-grade {
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: #777;
    margin-top: 6px;
    min-height: 1.2em;
  }

  #assist-note {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: #555;
    margin-top: 5px;
    min-height: 1em;
    font-style: italic;
  }

  #instructions {
    font-size: 0.72rem;
    color: #444;
    letter-spacing: 0.08em;
    margin-top: 14px;
  }

  #btn-retry {
    margin-top: 12px;
    background: none;
    border: 1px solid #333;
    color: #666;
    padding: 8px 28px;
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    display: none;
  }

  #btn-retry:hover {
    border-color: #888;
    color: #ccc;
  }

  /* CircleJerk */
  #btn-cj {
    background: none;
    border: 1px solid #3a1a1a;
    color: #a04040;
    padding: 5px 14px;
    font-family: 'Courier New', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  #btn-cj:hover { border-color: #c05050; color: #e06060; }

  #cj-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  #cj-modal.open { display: flex; }

  #cj-video {
    width: 320px;
    height: 320px;
    object-fit: cover;
    border-radius: 4px;
    border: 1px solid #333;
  }

  #cj-overlay {
    position: absolute;
    pointer-events: none;
    border-radius: 4px;
  }

  #cj-wrap {
    position: relative;
    width: 320px;
    height: 320px;
  }

  #cj-score {
    font-size: 2.8rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    min-height: 3.5rem;
    text-align: center;
  }

  #cj-grade {
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: #777;
    text-align: center;
    min-height: 1.2em;
  }

  #cj-hint {
    font-size: 0.68rem;
    color: #444;
    letter-spacing: 0.1em;
    text-align: center;
  }

  #btn-cj-close {
    background: none;
    border: 1px solid #333;
    color: #666;
    padding: 7px 24px;
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  #btn-cj-close:hover { border-color: #888; color: #ccc; }
</style>
</head>
<body>

<h1>Draw a Perfect Circle</h1>
<p id="subtitle">mouse or touch · release to score</p>

<div id="toggles">
  <button class="toggle-btn on" id="btn-grid">⊞ Grid: On</button>
  <button class="toggle-btn" id="btn-outline">◎ Outline: Off</button>
  <button id="btn-cj">⦿ CircleJerk</button>
</div>

<!-- CircleJerk Modal -->
<div id="cj-modal">
  <div id="cj-wrap">
    <video id="cj-video" autoplay playsinline muted></video>
    <canvas id="cj-overlay"></canvas>
  </div>
  <div id="cj-score">—</div>
  <div id="cj-grade"></div>
  <div id="cj-hint">Point camera at a hand-drawn circle</div>
  <button id="btn-cj-close">✕ Close</button>
</div>

<div id="canvas-wrapper">
  <canvas id="canvas" width="420" height="420"></canvas>
</div>

<div id="score-display">
  <div id="score-number">—</div>
  <div id="score-label">score</div>
  <div id="score-grade"></div>
  <div id="assist-note"></div>
</div>

<p id="instructions">Click and drag to draw your circle</p>
<button id="btn-retry">Try Again</button>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const scoreNumber = document.getElementById('score-number');
  const scoreGrade = document.getElementById('score-grade');
  const assistNote = document.getElementById('assist-note');
  const instructions = document.getElementById('instructions');
  const btnRetry = document.getElementById('btn-retry');
  const btnGrid = document.getElementById('btn-grid');
  const btnOutline = document.getElementById('btn-outline');

  const W = canvas.width;
  const H = canvas.height;

  let drawing = false;
  let points = [];
  let showGrid = true;
  let showOutline = false;

  // Locked in at draw start so toggling mid-draw doesn't affect assist credit
  let usedGrid = false;
  let usedOutline = false;

  // ─── Toggles ───────────────────────────────────────────────
  btnGrid.addEventListener('click', () => {
    showGrid = !showGrid;
    btnGrid.textContent = showGrid ? '⊞ Grid: On' : '⊞ Grid: Off';
    btnGrid.classList.toggle('on', showGrid);
    if (!drawing) renderBackground();
  });

  btnOutline.addEventListener('click', () => {
    showOutline = !showOutline;
    btnOutline.textContent = showOutline ? '◎ Outline: On' : '◎ Outline: Off';
    btnOutline.classList.toggle('on', showOutline);
    if (!drawing) renderBackground();
  });

  // ─── Background (grid + outline) ──────────────────────────
  function renderBackground() {
    ctx.clearRect(0, 0, W, H);
    ctx.setLineDash([]);

    if (showGrid) {
      const step = 30;
      // Minor grid lines
      ctx.strokeStyle = '#181818';
      ctx.lineWidth = 1;
      for (let x = step; x < W; x += step) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = step; y < H; y += step) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
      // Center axes slightly brighter
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
    }

    if (showOutline) {
      ctx.beginPath();
      ctx.arc(W/2, H/2, 130, 0, Math.PI * 2);
      ctx.strokeStyle = '#2c2c2c';
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 7]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // ─── Input ─────────────────────────────────────────────────
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    if (e.touches) {
      return {
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top) * scaleY
      };
    }
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  function startDraw(e) {
    e.preventDefault();
    drawing = true;
    points = [];
    // Snapshot assist state at draw start
    usedGrid = showGrid;
    usedOutline = showOutline;
    points.push(getPos(e));
    renderBackground();
    instructions.textContent = 'Keep going…';
    scoreNumber.textContent = '—';
    scoreNumber.style.color = '#fff';
    scoreGrade.textContent = '';
    assistNote.textContent = '';
    btnRetry.style.display = 'none';
  }

  function moveDraw(e) {
    e.preventDefault();
    if (!drawing) return;
    points.push(getPos(e));
    redrawStroke();
  }

  function endDraw(e) {
    e.preventDefault();
    if (!drawing) return;
    drawing = false;
    if (points.length > 10) {
      showScore(computeScore());
    } else {
      instructions.textContent = 'Draw a bigger circle!';
    }
    btnRetry.style.display = 'inline-block';
  }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', moveDraw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', moveDraw, { passive: false });
  canvas.addEventListener('touchend', endDraw, { passive: false });

  // ─── Stroke rendering ──────────────────────────────────────
  function redrawStroke() {
    renderBackground();
    if (points.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.strokeStyle = '#e8e8e8';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.setLineDash([]);
    ctx.stroke();
  }

  // ─── Score computation ─────────────────────────────────────
  function computeScore() {
    // Step 1: rough centroid as starting guess
    let cx = 0, cy = 0;
    for (const p of points) { cx += p.x; cy += p.y; }
    cx /= points.length;
    cy /= points.length;

    // Step 2: iterative best-fit circle center (Karimäki-style gradient descent)
    // This finds the true geometric center regardless of where you drew,
    // so off-center circles aren't penalised vs centered ones.
    for (let iter = 0; iter < 10; iter++) {
      const radii = points.map(p => Math.hypot(p.x - cx, p.y - cy));
      const avgR = radii.reduce((a, b) => a + b, 0) / radii.length;
      let dx = 0, dy = 0;
      for (let i = 0; i < points.length; i++) {
        const r = radii[i];
        if (r < 0.001) continue;
        const w = (r - avgR) / r;
        dx += (cx - points[i].x) * w;
        dy += (cy - points[i].y) * w;
      }
      cx -= dx / points.length;
      cy -= dy / points.length;
    }

    // Step 3: final radii from best-fit center
    const radii = points.map(p => Math.hypot(p.x - cx, p.y - cy));
    const avgR = radii.reduce((a, b) => a + b, 0) / radii.length;

    // 1. CIRCULARITY — coefficient of variation of radii from best-fit center.
    //    Pure shape measure: size and position don't matter at all.
    const variance = radii.reduce((s, r) => s + (r - avgR) ** 2, 0) / radii.length;
    const cv = Math.sqrt(variance) / avgR;
    // cv of ~0.02 (2%) = quite good. Scale so that feels like ~75 points.
    const circularity = Math.max(0, 1 - cv * 4);

    // 2. CLOSURE — gap between first and last point, scaled by radius.
    // A gap of half the radius = 0 closure score.
    const first = points[0], last = points[points.length - 1];
    const gapRatio = Math.hypot(last.x - first.x, last.y - first.y) / avgR;
    const closure = Math.max(0, 1 - gapRatio * 2);

    // Circularity dominates; closure adds a fair deduction for open circles
    const raw = circularity * 0.80 + closure * 0.20;

    // Mild power curve to keep mid-range scores meaningful
    return Math.min(100, Math.round(Math.pow(raw, 1.3) * 100));
  }

  function getGrade(score) {
    if (score >= 95) return { text: '✦ PERFECT ✦', color: '#ffe066' };
    if (score >= 85) return { text: 'Outstanding',  color: '#a3e4a3' };
    if (score >= 72) return { text: 'Excellent',    color: '#a3e4a3' };
    if (score >= 58) return { text: 'Great',        color: '#aad4f5' };
    if (score >= 44) return { text: 'Not bad',      color: '#aad4f5' };
    if (score >= 30) return { text: 'Keep trying',  color: '#e8e8e8' };
    if (score >= 15) return { text: 'Rough',        color: '#e8a87c' };
    return               { text: 'Needs work',   color: '#e87c7c' };
  }

  function showScore(score) {
    const grade = getGrade(score);

    scoreNumber.textContent = score + '%';
    scoreNumber.style.color = grade.color;
    scoreGrade.textContent = grade.text;
    scoreGrade.style.color = grade.color;
    assistNote.textContent = '';

    instructions.textContent = 'Done! Draw again to retry.';

    // Ghost best-fit circle overlay
    let cx = 0, cy = 0;
    for (const p of points) { cx += p.x; cy += p.y; }
    cx /= points.length; cy /= points.length;
    const radii = points.map(p => Math.hypot(p.x - cx, p.y - cy));
    const avgR = radii.reduce((a, b) => a + b, 0) / radii.length;

    ctx.beginPath();
    ctx.arc(cx, cy, avgR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 6]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ─── Retry ─────────────────────────────────────────────────
  btnRetry.addEventListener('click', () => {
    points = [];
    renderBackground();
    scoreNumber.textContent = '—';
    scoreNumber.style.color = '#fff';
    scoreGrade.textContent = '';
    assistNote.textContent = '';
    instructions.textContent = 'Click and drag to draw your circle';
    btnRetry.style.display = 'none';
  });

  // Init
  renderBackground();

  // ─── CircleJerk ────────────────────────────────────────────
  const cjModal   = document.getElementById('cj-modal');
  const cjVideo   = document.getElementById('cj-video');
  const cjOverlay = document.getElementById('cj-overlay');
  const cjScore   = document.getElementById('cj-score');
  const cjGrade   = document.getElementById('cj-grade');
  const btnCjClose = document.getElementById('btn-cj-close');
  const cjCtx     = cjOverlay.getContext('2d');
  let cjStream    = null;
  let cjRAF       = null;

  document.getElementById('btn-cj').addEventListener('click', async () => {
    cjModal.classList.add('open');
    cjScore.textContent = '—';
    cjScore.style.color = '#fff';
    cjGrade.textContent = '';
    // Reset smoothing state
    cjSmoothedScore = null;
    cjSmoothedConfidence = 0;
    cjSmoothedCx = null; cjSmoothedCy = null; cjSmoothedR = null;
    try {
      cjStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: 640, height: 640 }
      });
      cjVideo.srcObject = cjStream;
      cjVideo.onloadedmetadata = () => {
        cjOverlay.width  = cjVideo.videoWidth  || 320;
        cjOverlay.height = cjVideo.videoHeight || 320;
        cjOverlay.style.width  = '320px';
        cjOverlay.style.height = '320px';
        cjOverlay.style.position = 'absolute';
        cjOverlay.style.top = '0';
        cjOverlay.style.left = '0';
        cjLoop();
      };
    } catch(err) {
      cjGrade.textContent = 'Camera access denied';
    }
  });

  btnCjClose.addEventListener('click', () => {
    cjModal.classList.remove('open');
    if (cjStream) { cjStream.getTracks().forEach(t => t.stop()); cjStream = null; }
    if (cjRAF) { cancelAnimationFrame(cjRAF); cjRAF = null; }
  });

  // Offscreen canvas reused each frame for performance
  const cjOff = document.createElement('canvas');
  const cjOctx = cjOff.getContext('2d');

  // Temporal smoothing state
  let cjSmoothedScore = null;
  let cjSmoothedConfidence = 0;
  let cjSmoothedCx = null, cjSmoothedCy = null, cjSmoothedR = null;

  function cjLoop() {
    cjRAF = requestAnimationFrame(cjLoop);
    const vw = cjOverlay.width, vh = cjOverlay.height;
    if (!vw || !vh) return;

    // Downsample to 200px wide — higher res helps with faint pencil lines
    const SW = 200, SH = Math.round(vh * (200 / vw));
    cjOff.width = SW; cjOff.height = SH;
    cjOctx.drawImage(cjVideo, 0, 0, SW, SH);
    const frame = cjOctx.getImageData(0, 0, SW, SH);
    const d = frame.data;

    // Greyscale
    const grey = new Uint8Array(SW * SH);
    for (let i = 0; i < SW * SH; i++) {
      grey[i] = (d[i*4]*77 + d[i*4+1]*150 + d[i*4+2]*29) >> 8;
    }

    // Sobel magnitude
    const mag = new Float32Array(SW * SH);
    let maxMag = 0;
    for (let y = 1; y < SH - 1; y++) {
      for (let x = 1; x < SW - 1; x++) {
        const i = y * SW + x;
        const gx = -grey[i-SW-1] + grey[i-SW+1] - 2*grey[i-1] + 2*grey[i+1] - grey[i+SW-1] + grey[i+SW+1];
        const gy = -grey[i-SW-1] - 2*grey[i-SW] - grey[i-SW+1] + grey[i+SW-1] + 2*grey[i+SW] + grey[i+SW+1];
        mag[i] = Math.abs(gx) + Math.abs(gy);
        if (mag[i] > maxMag) maxMag = mag[i];
      }
    }

    // Use top 5% of edge magnitudes — sensitive enough for faint pencil
    const edgeThresh = maxMag * 0.05;
    const pts = [];
    for (let y = 1; y < SH - 1; y++) {
      for (let x = 1; x < SW - 1; x++) {
        if (mag[y * SW + x] > edgeThresh) pts.push({x, y});
      }
    }

    cjCtx.clearRect(0, 0, vw, vh);

    if (pts.length < 20 || pts.length > 4000) {
      cjSmoothedConfidence *= 0.85; // decay slowly, don't snap to zero
      _cjRender();
      return;
    }

    // Sample up to 400 edge points evenly
    const step = Math.max(1, Math.floor(pts.length / 400));
    const sample = pts.filter((_, i) => i % step === 0);

    // ── RANSAC-style best circle fit ─────────────────────────
    // Try multiple candidate centers and pick the one with the most
    // inlier edge points — this ignores paper edges / background noise.
    const RANSAC_ITERS = 18;
    const INLIER_TOL   = 0.15; // point is inlier if radius within ±15% of avgR

    let bestCx = 0, bestCy = 0, bestR = 0, bestInliers = 0;

    // Seed candidates: centroid + random triplets of sample points
    const seeds = [];
    // Always try the centroid as one seed
    seeds.push({
      cx: sample.reduce((s,p)=>s+p.x,0)/sample.length,
      cy: sample.reduce((s,p)=>s+p.y,0)/sample.length
    });
    // Random triplet seeds
    for (let t = 0; t < RANSAC_ITERS; t++) {
      const a = sample[Math.floor(Math.random()*sample.length)];
      const b = sample[Math.floor(Math.random()*sample.length)];
      const c = sample[Math.floor(Math.random()*sample.length)];
      // Circumcenter of triangle abc
      const ax = b.x-a.x, ay = b.y-a.y;
      const bx = c.x-a.x, by = c.y-a.y;
      const D  = 2*(ax*by - ay*bx);
      if (Math.abs(D) < 1e-6) continue;
      const ux = (by*(ax*ax+ay*ay) - ay*(bx*bx+by*by)) / D;
      const uy = (ax*(bx*bx+by*by) - bx*(ax*ax+ay*ay)) / D;
      seeds.push({ cx: a.x+ux, cy: a.y+uy });
    }

    for (const seed of seeds) {
      // Gradient descent from this seed
      let cx = seed.cx, cy = seed.cy;
      for (let iter = 0; iter < 15; iter++) {
        const radii = sample.map(p => Math.hypot(p.x-cx, p.y-cy));
        const avgR  = radii.reduce((a,b)=>a+b,0)/radii.length;
        let dx=0, dy=0;
        for (let i=0; i<sample.length; i++) {
          const r = radii[i]; if (r<0.5) continue;
          const w = (r-avgR)/r;
          dx += (cx-sample[i].x)*w;
          dy += (cy-sample[i].y)*w;
        }
        cx -= dx/sample.length*0.5;
        cy -= dy/sample.length*0.5;
      }
      const radii = sample.map(p => Math.hypot(p.x-cx, p.y-cy));
      const avgR  = radii.reduce((a,b)=>a+b,0)/radii.length;
      if (avgR < 8 || avgR > SW*0.48) continue;
      // Count inliers
      const inliers = radii.filter(r => Math.abs(r-avgR)/avgR < INLIER_TOL).length;
      if (inliers > bestInliers) {
        bestInliers = inliers; bestCx = cx; bestCy = cy; bestR = avgR;
      }
    }

    // Require at least 30% of sample to be inliers
    if (bestInliers < sample.length * 0.30 || bestR < 8) {
      cjSmoothedConfidence *= 0.85;
      _cjRender();
      return;
    }

    // Final pass: refit using only inliers for a cleaner circle
    const inlierPts = sample.filter(p => {
      const r = Math.hypot(p.x-bestCx, p.y-bestCy);
      return Math.abs(r-bestR)/bestR < INLIER_TOL;
    });
    let cx = bestCx, cy = bestCy;
    for (let iter = 0; iter < 10; iter++) {
      const radii = inlierPts.map(p => Math.hypot(p.x-cx, p.y-cy));
      const avgR  = radii.reduce((a,b)=>a+b,0)/radii.length;
      let dx=0, dy=0;
      for (let i=0; i<inlierPts.length; i++) {
        const r=radii[i]; if(r<0.5) continue;
        const w=(r-avgR)/r;
        dx+=(cx-inlierPts[i].x)*w; dy+=(cy-inlierPts[i].y)*w;
      }
      cx-=dx/inlierPts.length*0.5; cy-=dy/inlierPts.length*0.5;
    }

    const radii = inlierPts.map(p => Math.hypot(p.x-cx, p.y-cy));
    const avgR  = radii.reduce((a,b)=>a+b,0)/radii.length;

    // Reject implausible detections
    if (avgR < 8 || avgR > SW * 0.48) {
      cjSmoothedConfidence *= 0.85;
      _cjRender();
      return;
    }

    // CV and angular coverage → confidence
    const variance = radii.reduce((s,r) => s + (r - avgR)**2, 0) / radii.length;
    const cv = Math.sqrt(variance) / avgR;

    const SECTORS = 16;
    const hit = new Array(SECTORS).fill(false);
    for (const p of inlierPts) {
      const angle = Math.atan2(p.y - cy, p.x - cx);
      hit[Math.floor(((angle + Math.PI) / (2 * Math.PI)) * SECTORS) % SECTORS] = true;
    }
    const covered = hit.filter(Boolean).length / SECTORS;

    // Confidence: how sure are we this is actually a circle?
    // - cvConf: low radius variance = round shape
    // - coverConf: edge points spread around full circumference
    // - inlierConf: lots of edge points agree on this circle vs background
    const cvConf     = Math.max(0, 1 - cv / 0.4);                            // forgive up to 40% CV
    const coverConf  = Math.max(0, (covered - 0.5) / 0.5);                   // needs 50%+ coverage, full at 100%
    const inlierConf = Math.min(1, (bestInliers / sample.length - 0.25) / 0.35); // needs 25%+ inliers
    const frameConf  = cvConf * 0.35 + coverConf * 0.45 + inlierConf * 0.20;

    // Raw score this frame
    // 1. Circularity: how round is the shape (radius variance)
    const circularity = Math.max(0, 1 - cv * 4);

    // 2. Smoothness: measure how jagged the line is by checking
    //    angular consistency of neighbouring inlier points.
    //    Sort inliers by angle, measure variance in arc-step sizes.
    const angles = inlierPts.map(p => Math.atan2(p.y - cy, p.x - cx)).sort((a,b) => a-b);
    let angleVar = 0;
    if (angles.length > 4) {
      const steps = [];
      for (let i = 1; i < angles.length; i++) steps.push(angles[i] - angles[i-1]);
      const meanStep = steps.reduce((a,b)=>a+b,0) / steps.length;
      angleVar = steps.reduce((s,v)=>s+(v-meanStep)**2,0) / steps.length;
      // Normalise: perfect even spacing = 0, very jagged = high
    }
    // Map to 0-1 smoothness score (tuned so moderate jag = ~0.7, bad = ~0.4)
    const smoothness = Math.max(0, 1 - Math.sqrt(angleVar) * 3);

    // Combined: circularity dominates, smoothness trims jagged lines
    const raw = circularity * 0.80 + smoothness * 0.20;
    const frameScore  = Math.min(100, Math.round(Math.pow(raw, 1.3) * 100));

    // ── Temporal smoothing ──────────────────────────────────
    // Confidence: ease toward frame value (fast up, slow down)
    const confLerp = frameConf > cjSmoothedConfidence ? 0.2 : 0.05;
    cjSmoothedConfidence = cjSmoothedConfidence * (1 - confLerp) + frameConf * confLerp;

    // Score: only move when confidence is reasonable
    if (cjSmoothedScore === null) cjSmoothedScore = frameScore;
    const scoreLerp = 0.1;
    cjSmoothedScore = cjSmoothedScore * (1 - scoreLerp) + frameScore * scoreLerp;

    // Circle geometry: smooth position/radius too so overlay doesn't jitter
    if (cjSmoothedCx === null) { cjSmoothedCx = cx; cjSmoothedCy = cy; cjSmoothedR = avgR; }
    const geoLerp = 0.15;
    cjSmoothedCx = cjSmoothedCx * (1 - geoLerp) + cx * geoLerp;
    cjSmoothedCy = cjSmoothedCy * (1 - geoLerp) + cy * geoLerp;
    cjSmoothedR  = cjSmoothedR  * (1 - geoLerp) + avgR * geoLerp;

    _cjRender();

    function _cjRender() {
      const displayScore = Math.round(cjSmoothedScore ?? 0);
      const grade   = getGrade(displayScore);
      const alpha   = Math.max(0.15, Math.min(1, 0.15 + cjSmoothedConfidence * 0.85));

      cjScore.textContent   = (cjSmoothedScore !== null) ? displayScore + '%' : '—';
      cjScore.style.color   = grade.color;
      cjScore.style.opacity = alpha;
      cjGrade.textContent   = cjSmoothedConfidence < 0.2 ? 'Searching…' : grade.text;
      cjGrade.style.color   = grade.color;
      cjGrade.style.opacity = alpha;

      if (cjSmoothedCx !== null && cjSmoothedR !== null) {
        const scaleX = vw / SW, scaleY = vh / SH;
        const dscale = 320 / vw;
        cjCtx.save();
        cjCtx.scale(dscale, dscale);
        cjCtx.globalAlpha = alpha;
        cjCtx.beginPath();
        cjCtx.arc(cjSmoothedCx * scaleX, cjSmoothedCy * scaleY, cjSmoothedR * scaleX, 0, Math.PI * 2);
        cjCtx.strokeStyle = grade.color;
        cjCtx.lineWidth = 2;
        cjCtx.setLineDash([6, 8]);
        cjCtx.stroke();
        cjCtx.setLineDash([]);
        cjCtx.beginPath();
        cjCtx.arc(cjSmoothedCx * scaleX, cjSmoothedCy * scaleY, 4, 0, Math.PI * 2);
        cjCtx.fillStyle = grade.color;
        cjCtx.fill();
        cjCtx.restore();
      }
    }
  }
</script>
